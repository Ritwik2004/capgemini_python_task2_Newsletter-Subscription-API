<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Newsletter Subscription API</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f8;
        }
        nav {
            background-color: #1e293b;
            padding: 15px;
            padding-left: 5rem;
            display: flex;
            gap: 50px;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            padding: 30px;
        }
        .form {
            width: 100%;
            display: flex;
            justify-content: center;
        }
        h2 {
            margin-bottom: 20px;
        }
        input[type="email"] {
            padding: 10px;
            width: 300px;
            margin-right: 10px;
        }
        button {
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            background-color: #2563eb;
            color: white;
            border-radius: 4px;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .subscriber {
            background: white;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            border-radius: 4px;
        }
        .unsubscribe-btn {
            background-color: #dc2626;
        }
        .unsubscribe-btn:hover {
            background-color: #b91c1c;
        }
        .update-btn {
            background-color: #16a34a;
            margin-right: 5px;
        }
        .update-btn:hover {
            background-color: #15803d;
        }
        .message {
            margin-top: 15px;
            font-weight: bold;
        }

        /* Modal */
        #updateModal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        #updateModal .modal-box {
            background: white;
            padding: 20px;
            width: 350px;
            border-radius: 6px;
            text-align: center;
        }
    </style>
</head>

<body>

<nav>
    <a onclick="showHome()">Home</a>
    <a onclick="showSubscribers()">Subscribers</a>
</nav>

<div class="container">

    <div class="form">
        <div id="homeSection">
            <h2>Subscribe to Newsletter</h2>
            <input type="email" id="emailInput" placeholder="Enter your email">
            <button onclick="subscribe()">Click to Subscribe</button>
            <div class="message" id="homeMessage"></div>
        </div>
    </div>

    <div id="subscribersSection" style="display:none;">
        <h2>Subscribed Emails</h2>
        <div id="subscriberList"></div>
    </div>

</div>

<!-- UPDATE EMAIL MODAL -->
<div id="updateModal">
    <div class="modal-box">
        <h3>Update Email</h3>
        <input type="email" id="newEmailInput" placeholder="Enter new email">
        <br><br>
        <button onclick="confirmUpdate()">Update</button>
        <button onclick="closeModal()" style="background:#6b7280;">Cancel</button>
    </div>
</div>

<script>
    const BASE_URL = "http://127.0.0.1:5000";
    let oldEmailToUpdate = "";

    function showHome() {
        document.getElementById("homeSection").style.display = "block";
        document.getElementById("subscribersSection").style.display = "none";
    }

    function showSubscribers() {
        document.getElementById("homeSection").style.display = "none";
        document.getElementById("subscribersSection").style.display = "block";
        fetchSubscribers();
    }

    function subscribe() {
        const emailInput = document.getElementById("emailInput");
        const message = document.getElementById("homeMessage");

        fetch(`${BASE_URL}/subscribe`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: emailInput.value })
        })
        .then(res => res.json())
        .then(data => {
            message.innerText = data.message || data.error;
            if (data.message) emailInput.value = "";
        })
        .catch(() => {
            message.innerText = "Server error";
        });
    }

    function fetchSubscribers() {
        fetch(`${BASE_URL}/subscribers`)
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById("subscriberList");
            list.innerHTML = "";

            data.forEach(item => {
                const div = document.createElement("div");
                div.className = "subscriber";
                div.innerHTML = `
                    <span>${item.email}</span>
                    <div>
                        <button class="update-btn" onclick="openUpdateModal('${item.email}')">
                            Update Email
                        </button>
                        <button class="unsubscribe-btn" onclick="unsubscribe('${item.email}')">
                            Unsubscribe
                        </button>
                    </div>
                `;
                list.appendChild(div);
            });
        });
    }

    function unsubscribe(email) {
        fetch(`${BASE_URL}/unsubscribe`, {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
        })
        .then(() => fetchSubscribers());
    }

    function openUpdateModal(oldEmail) {
        oldEmailToUpdate = oldEmail;
        document.getElementById("newEmailInput").value = "";
        document.getElementById("updateModal").style.display = "flex";
    }

    function closeModal() {
        document.getElementById("updateModal").style.display = "none";
    }

    function confirmUpdate() {
        const newEmail = document.getElementById("newEmailInput").value;

        if (!newEmail) {
            alert("Please enter a new email");
            return;
        }

        fetch(`${BASE_URL}/updateEmail`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                oldEmail: oldEmailToUpdate,
                newEmail: newEmail
            })
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message || data.error);
            closeModal();
            fetchSubscribers();
        })
        .catch(() => alert("Server error"));
    }
</script>

</body>
</html>
